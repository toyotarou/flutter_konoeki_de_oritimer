name: flutter_oritimer
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  native_geofence: ^1.2.1
  flutter_local_notifications: ^20.1.0
  permission_handler: ^12.0.1
  geolocator: ^13.0.0

  http: ^1.2.1
  intl: ^0.20.2

  # Riverpod
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Freezed
  freezed_annotation: ^2.4.1

  # UI/スクロール制御
  scroll_to_index: ^3.0.1
  scrollable_positioned_list: ^0.3.8

  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.3.8

  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  font_awesome_flutter: ^10.7.0

  flutter_cache_manager: ^3.4.1

  flutter_localizations:
    sdk: flutter

  fl_chart: ^0.69.0
  dotted_line: ^3.2.3
  cached_network_image: ^3.4.1

  flutter_dotenv: ^5.2.1
  flutter_carousel_slider: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # コード生成
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0

  # Lint
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:

  uses-material-design: true

  assets:
    - assets/images/

flutter_native_splash:
  image: "assets/images/mezamashi.png"
  color: "222222"

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/ic_launcher.png"

  adaptive_icon_background: "#222222"
  adaptive_icon_foreground: "assets/images/ic_launcher.png"
